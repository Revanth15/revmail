# Before deploying, create a persistent SQLite volume and configure secrets:
# fly volumes create email_gateway_data --region sin --size 1
# fly secrets set RESEND_API_KEY=...
# fly secrets set API_KEY_PEPPER=...
# fly secrets set PROJECTS_JSON='...'
# fly deploy

app = "revmail"
primary_region = "sin"

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [[http_service.checks]]
    interval = "15s"
    timeout = "2s"
    grace_period = "10s"
    method = "GET"
    path = "/health"

[[mounts]]
  source = "email_gateway_data"
  destination = "/data"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"

